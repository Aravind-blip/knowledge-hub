services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowledge-hub-postgres
    environment:
      POSTGRES_DB: knowledge_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    working_dir: /app
    env_file:
      - ../backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/knowledge_hub
      ALLOWED_ORIGINS_RAW: http://localhost:3000
      RUN_DB_MIGRATIONS_ON_STARTUP: "true"
    volumes:
      - ../backend/app:/app/app
      - ../backend/scripts:/app/scripts
      - ../backend/alembic.ini:/app/alembic.ini
      - ../backend/data:/app/data
      - ../infra/db/migrations:/app/infra/db/migrations
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    command: sh -c "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - ../frontend/.env.example
    environment:
      API_BASE_URL: http://backend:8000
    volumes:
      - ../frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
